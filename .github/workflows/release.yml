name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0). Leave empty for dry-run.'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — build only, no tag/release'
        type: boolean
        default: true
      build_linux_amd64:
        description: 'Build Linux x64'
        type: boolean
        default: true
      build_linux_arm64:
        description: 'Build Linux ARM64'
        type: boolean
        default: false
      build_windows_amd64:
        description: 'Build Windows x64'
        type: boolean
        default: true
      build_windows_arm64:
        description: 'Build Windows ARM64'
        type: boolean
        default: false
      build_macos_arm64:
        description: 'Build macOS Apple Silicon'
        type: boolean
        default: true
      build_macos_amd64:
        description: 'Build macOS Intel'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      is_release: ${{ steps.resolve.outputs.is_release }}
      prev_tag: ${{ steps.resolve.outputs.prev_tag }}
      do_linux_amd64: ${{ steps.targets.outputs.linux_amd64 }}
      do_linux_arm64: ${{ steps.targets.outputs.linux_arm64 }}
      do_windows_amd64: ${{ steps.targets.outputs.windows_amd64 }}
      do_windows_arm64: ${{ steps.targets.outputs.windows_arm64 }}
      do_macos_arm64: ${{ steps.targets.outputs.macos_arm64 }}
      do_macos_amd64: ${{ steps.targets.outputs.macos_amd64 }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version and mode
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          elif [[ -n "${{ inputs.version }}" && "${{ inputs.dry_run }}" == "false" ]]; then
            VERSION="${{ inputs.version }}"
            [[ "$VERSION" != v* ]] && VERSION="v$VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "version=dry-run" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Resolve build targets
        id: targets
        run: |
          # Tag push builds all platforms; dispatch uses checkboxes
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "linux_amd64=true" >> $GITHUB_OUTPUT
            echo "linux_arm64=true" >> $GITHUB_OUTPUT
            echo "windows_amd64=true" >> $GITHUB_OUTPUT
            echo "windows_arm64=true" >> $GITHUB_OUTPUT
            echo "macos_arm64=true" >> $GITHUB_OUTPUT
            echo "macos_amd64=true" >> $GITHUB_OUTPUT
          else
            echo "linux_amd64=${{ inputs.build_linux_amd64 }}" >> $GITHUB_OUTPUT
            echo "linux_arm64=${{ inputs.build_linux_arm64 }}" >> $GITHUB_OUTPUT
            echo "windows_amd64=${{ inputs.build_windows_amd64 }}" >> $GITHUB_OUTPUT
            echo "windows_arm64=${{ inputs.build_windows_arm64 }}" >> $GITHUB_OUTPUT
            echo "macos_arm64=${{ inputs.build_macos_arm64 }}" >> $GITHUB_OUTPUT
            echo "macos_amd64=${{ inputs.build_macos_amd64 }}" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.resolve.outputs.is_release == 'true' && github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Create release branch
        if: steps.resolve.outputs.is_release == 'true'
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          git checkout -b "release/$VERSION"
          git push origin "release/$VERSION" || true

  # --- Builds (conditional per platform) ---

  build-linux-amd64:
    needs: prepare
    if: needs.prepare.outputs.do_linux_amd64 == 'true'
    uses: ./.github/workflows/build.yml
    with:
      os: ubuntu-24.04
      goos: linux
      goarch: amd64
      platform: linux/amd64
      artifact_name: stargrazer-linux-amd64
      chromium_url: "https://github.com/ungoogled-software/ungoogled-chromium-portablelinux/releases/download/146.0.7680.177-1/ungoogled-chromium-146.0.7680.177-1-x86_64_linux.tar.xz"
      chromium_cache_key: chromium-linux-x64
      version: ${{ needs.prepare.outputs.version }}

  build-linux-arm64:
    needs: prepare
    if: needs.prepare.outputs.do_linux_arm64 == 'true'
    uses: ./.github/workflows/build.yml
    with:
      os: ubuntu-24.04-arm
      goos: linux
      goarch: arm64
      platform: linux/arm64
      artifact_name: stargrazer-linux-arm64
      chromium_url: "https://github.com/ungoogled-software/ungoogled-chromium-portablelinux/releases/download/147.0.7727.55-1/ungoogled-chromium-147.0.7727.55-1-arm64_linux.tar.xz"
      chromium_cache_key: chromium-linux-arm64
      version: ${{ needs.prepare.outputs.version }}

  build-windows-amd64:
    needs: prepare
    if: needs.prepare.outputs.do_windows_amd64 == 'true'
    uses: ./.github/workflows/build.yml
    with:
      os: windows-2025
      goos: windows
      goarch: amd64
      platform: windows/amd64
      artifact_name: stargrazer-windows-amd64
      chromium_url: "https://github.com/ungoogled-software/ungoogled-chromium-windows/releases/download/147.0.7727.101-1.1/ungoogled-chromium_147.0.7727.101-1.1_installer_x64.exe"
      chromium_cache_key: chromium-windows-x64
      version: ${{ needs.prepare.outputs.version }}

  build-windows-arm64:
    needs: prepare
    if: needs.prepare.outputs.do_windows_arm64 == 'true'
    uses: ./.github/workflows/build.yml
    with:
      os: windows-11-arm
      goos: windows
      goarch: arm64
      platform: windows/arm64
      artifact_name: stargrazer-windows-arm64
      chromium_url: "https://github.com/ungoogled-software/ungoogled-chromium-windows/releases/download/147.0.7727.101-1.1/ungoogled-chromium_147.0.7727.101-1.1_installer_arm64.exe"
      chromium_cache_key: chromium-windows-arm64
      version: ${{ needs.prepare.outputs.version }}

  build-macos-arm64:
    needs: prepare
    if: needs.prepare.outputs.do_macos_arm64 == 'true'
    uses: ./.github/workflows/build.yml
    with:
      os: macos-15
      goos: darwin
      goarch: arm64
      platform: darwin/arm64
      artifact_name: stargrazer-macos-arm64
      chromium_url: "https://github.com/claudiodekker/ungoogled-chromium-macos/releases/download/130.0.6723.91-1.1/ungoogled-chromium_130.0.6723.91-1.1_arm64-macos-signed.dmg"
      chromium_cache_key: chromium-macos-arm64
      version: ${{ needs.prepare.outputs.version }}

  build-macos-amd64:
    needs: prepare
    if: needs.prepare.outputs.do_macos_amd64 == 'true'
    uses: ./.github/workflows/build.yml
    with:
      os: macos-15-intel
      goos: darwin
      goarch: amd64
      platform: darwin/amd64
      artifact_name: stargrazer-macos-amd64
      chromium_url: "https://github.com/claudiodekker/ungoogled-chromium-macos/releases/download/130.0.6723.91-1.1/ungoogled-chromium_130.0.6723.91-1.1_x86-64-macos-signed.dmg"
      chromium_cache_key: chromium-macos-x64
      version: ${{ needs.prepare.outputs.version }}

  # --- Publish ---

  publish:
    needs: [prepare, build-linux-amd64, build-linux-arm64, build-windows-amd64, build-windows-arm64, build-macos-arm64, build-macos-amd64]
    if: always() && needs.prepare.outputs.is_release == 'true' && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts/ -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.exe" -o -name "*.dmg" \) -exec cp {} release-files/ \;
          echo "Release files:"
          ls -lh release-files/ || echo "No release files found"

      - name: Generate changelog
        run: |
          PREV_TAG="${{ needs.prepare.outputs.prev_tag }}"

          echo "## Changelog" > changelog.md
          echo "" >> changelog.md

          if [ -n "$PREV_TAG" ]; then
            echo "Changes since \`$PREV_TAG\`:" >> changelog.md
            echo "" >> changelog.md
            git log "$PREV_TAG"..HEAD --pretty=format:"- %s (\`%h\`)" --no-merges >> changelog.md
          else
            echo "Initial release." >> changelog.md
            echo "" >> changelog.md
            git log --pretty=format:"- %s (\`%h\`)" --no-merges >> changelog.md
          fi
          echo "" >> changelog.md

      - name: Generate release notes
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"

          cat > release-notes.md << HEADER
          ## Stargrazer ${VERSION}

          ### Downloads

          | Platform | Architecture | File | Size |
          |----------|-------------|------|------|
          HEADER

          for f in release-files/*; do
            [ ! -f "$f" ] && continue
            fname=$(basename "$f")
            size=$(du -h "$f" | cut -f1)
            case "$fname" in
              *linux-amd64*.tar.gz)       echo "| Linux | x86_64 | \`$fname\` | $size |" >> release-notes.md ;;
              *linux-arm64*.tar.gz)       echo "| Linux | ARM64 | \`$fname\` | $size |" >> release-notes.md ;;
              *windows-amd64*setup*)      echo "| Windows | x64 (Installer) | \`$fname\` | $size |" >> release-notes.md ;;
              *windows-amd64*.zip)        echo "| Windows | x64 (Portable) | \`$fname\` | $size |" >> release-notes.md ;;
              *windows-arm64*setup*)      echo "| Windows | ARM64 (Installer) | \`$fname\` | $size |" >> release-notes.md ;;
              *windows-arm64*.zip)        echo "| Windows | ARM64 (Portable) | \`$fname\` | $size |" >> release-notes.md ;;
              *macos-arm64*)              echo "| macOS | Apple Silicon | \`$fname\` | $size |" >> release-notes.md ;;
              *macos-amd64*)              echo "| macOS | Intel | \`$fname\` | $size |" >> release-notes.md ;;
            esac
          done

          echo "" >> release-notes.md
          cat changelog.md >> release-notes.md

          cat >> release-notes.md << FOOTER

          ### What's included
          - Bundled Ungoogled Chromium with stealth configuration
          - Chrome DevTools Protocol (CDP) automation
          - Social media session management (6 platforms)
          - Cookie-based auth with auto keep-alive scheduler
          - Content upload workflows with scheduling
          - Dark and light themes

          ### Requirements
          - Windows 10+ / macOS 12+ / Linux (glibc 2.31+)
          - WebView2 runtime (Windows, auto-installed)

          ---
          *Built with [Wails v2](https://wails.io) + Go + React + TypeScript*
          FOOTER

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          body_path: release-notes.md
          files: release-files/*
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, 'alpha') || contains(needs.prepare.outputs.version, 'beta') || contains(needs.prepare.outputs.version, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
