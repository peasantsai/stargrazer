name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '24'

jobs:
  create-release-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release branch
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          git checkout -b release/$VERSION
          git push origin release/$VERSION

  build:
    needs: create-release-branch
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            platform: linux/amd64
            artifact_name: stargrazer-linux-amd64
            chromium_url: "https://github.com/ungoogled-software/ungoogled-chromium-portablelinux/releases/download/146.0.7680.177-1/ungoogled-chromium-146.0.7680.177-1-x86_64_linux.tar.xz"
            chromium_cache_key: chromium-linux-x64

          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            platform: linux/arm64
            artifact_name: stargrazer-linux-arm64
            chromium_url: "https://github.com/ungoogled-software/ungoogled-chromium-portablelinux/releases/download/147.0.7727.55-1/ungoogled-chromium-147.0.7727.55-1-arm64_linux.tar.xz"
            chromium_cache_key: chromium-linux-arm64

          - os: windows-latest
            goos: windows
            goarch: amd64
            platform: windows/amd64
            artifact_name: stargrazer-windows-amd64
            chromium_url: "https://github.com/ungoogled-software/ungoogled-chromium-windows/releases/download/147.0.7727.101-1.1/ungoogled-chromium_147.0.7727.101-1.1_installer_x64.exe"
            chromium_cache_key: chromium-windows-x64

          - os: windows-latest
            goos: windows
            goarch: arm64
            platform: windows/arm64
            artifact_name: stargrazer-windows-arm64
            chromium_url: "https://github.com/ungoogled-software/ungoogled-chromium-windows/releases/download/147.0.7727.101-1.1/ungoogled-chromium_147.0.7727.101-1.1_installer_arm64.exe"
            chromium_cache_key: chromium-windows-arm64

          - os: macos-latest
            goos: darwin
            goarch: arm64
            platform: darwin/arm64
            artifact_name: stargrazer-macos-arm64
            chromium_url: "https://github.com/claudiodekker/ungoogled-chromium-macos/releases/download/130.0.6723.91-1.1/ungoogled-chromium_130.0.6723.91-1.1_arm64-macos-signed.dmg"
            chromium_cache_key: chromium-macos-arm64

          - os: macos-13
            goos: darwin
            goarch: amd64
            platform: darwin/amd64
            artifact_name: stargrazer-macos-amd64
            chromium_url: "https://github.com/claudiodekker/ungoogled-chromium-macos/releases/download/130.0.6723.91-1.1/ungoogled-chromium_130.0.6723.91-1.1_x86-64-macos-signed.dmg"
            chromium_cache_key: chromium-macos-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev gcc-aarch64-linux-gnu pkg-config

      - name: Cache Chromium
        id: chromium-cache
        uses: actions/cache@v4
        with:
          path: assets/chromium-bundle
          key: ${{ matrix.chromium_cache_key }}-v1

      - name: Download Chromium
        if: steps.chromium-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p assets/chromium-bundle
          FILENAME="/tmp/chromium-download"
          curl -L -o "$FILENAME" "${{ matrix.chromium_url }}"

          if [[ "${{ matrix.goos }}" == "linux" ]]; then
            mkdir -p /tmp/chromium-extract
            tar xf "$FILENAME" -C /tmp/chromium-extract 2>/dev/null || tar xJf "$FILENAME" -C /tmp/chromium-extract 2>/dev/null
            CHROME_DIR=$(find /tmp/chromium-extract -name "chrome" -type f -exec dirname {} \; | head -1)
            if [ -n "$CHROME_DIR" ]; then
              cp -R "$CHROME_DIR"/* assets/chromium-bundle/
            else
              cp -R /tmp/chromium-extract/*/* assets/chromium-bundle/ 2>/dev/null || cp -R /tmp/chromium-extract/* assets/chromium-bundle/
            fi
          elif [[ "${{ matrix.goos }}" == "darwin" ]]; then
            hdiutil attach "$FILENAME" -mountpoint /tmp/chromium-dmg -nobrowse
            cp -R /tmp/chromium-dmg/Chromium.app assets/chromium-bundle/
            hdiutil detach /tmp/chromium-dmg
          elif [[ "${{ matrix.goos }}" == "windows" ]]; then
            7z x "$FILENAME" -o"$GITHUB_WORKSPACE/assets/chromium-bundle" -y || true
          fi

      - name: Clean Chromium bundle
        if: steps.chromium-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cd assets/chromium-bundle
          rm -rf swiftshader VisualElements default_apps MEIPreload Dictionaries
          rm -f chrome_200_percent.pak notification_helper* elevation_service* chrome_proxy* chrome_pwa_launcher* chrome_wer*
          rm -f *.debug *.pdb
          if [ -d locales ]; then
            find locales -type f ! -name 'en-US.pak' -delete 2>/dev/null || true
          fi
          echo "Chromium bundle size:"
          du -sh .

      - name: Install Wails
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install UPX (Linux)
        if: matrix.goos == 'linux'
        run: sudo apt-get install -y upx-ucl

      - name: Install NSIS (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: choco install nsis -y

      - name: Build
        shell: bash
        env:
          CGO_ENABLED: 1
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [[ "${{ matrix.platform }}" == "linux/arm64" ]]; then
            export CC=aarch64-linux-gnu-gcc
          fi

          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            wails build -platform ${{ matrix.platform }} -nsis -o stargrazer.exe -ldflags "-X main.version=$VERSION"
          else
            wails build -platform ${{ matrix.platform }} -o stargrazer -ldflags "-X main.version=$VERSION"
          fi

      - name: Compress with UPX (Linux)
        if: matrix.goos == 'linux'
        run: upx --best build/bin/stargrazer || true

      - name: Bundle Chromium with build
        shell: bash
        run: |
          mkdir -p build/bin/assets/chromium-bundle
          cp -R assets/chromium-bundle/* build/bin/assets/chromium-bundle/ 2>/dev/null || true
          cp -R assets/cookies-extension build/bin/assets/cookies-extension 2>/dev/null || true

      - name: Package release artifact
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          ARTIFACT="${{ matrix.artifact_name }}-${VERSION}"
          mkdir -p dist

          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            cp build/bin/*installer* "dist/${ARTIFACT}-setup.exe" 2>/dev/null || true
            cd build/bin
            7z a "$GITHUB_WORKSPACE/dist/${ARTIFACT}.zip" . -r
          elif [[ "${{ matrix.goos }}" == "darwin" ]]; then
            cd build/bin
            zip -r "$GITHUB_WORKSPACE/dist/${ARTIFACT}.zip" .
          else
            cd build/bin
            tar czf "$GITHUB_WORKSPACE/dist/${ARTIFACT}.tar.gz" .
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts/ -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.exe" -o -name "*.dmg" \) -exec cp {} release-files/ \;
          echo "Release files:"
          ls -lh release-files/

      - name: Generate release notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          cat > release-notes.md << 'NOTES'
          ## Stargrazer $VERSION

          ### What's included
          - Bundled Ungoogled Chromium browser with stealth configuration
          - Chrome DevTools Protocol (CDP) integration
          - Social media session management (Facebook, Instagram, TikTok, YouTube, LinkedIn, X)
          - Cookie-based authentication with auto keep-alive scheduler
          - Content upload workflows with scheduling
          - Dark and light themes

          ### Downloads

          | Platform | Architecture | File |
          |----------|-------------|------|
          NOTES

          for f in release-files/*; do
            fname=$(basename "$f")
            size=$(du -h "$f" | cut -f1)
            case "$fname" in
              *linux-amd64*) echo "| Linux | x86_64 | [$fname]($fname) ($size) |" >> release-notes.md ;;
              *linux-arm64*) echo "| Linux | ARM64 | [$fname]($fname) ($size) |" >> release-notes.md ;;
              *windows-amd64*setup*) echo "| Windows | x64 (Installer) | [$fname]($fname) ($size) |" >> release-notes.md ;;
              *windows-amd64*.zip) echo "| Windows | x64 (Portable) | [$fname]($fname) ($size) |" >> release-notes.md ;;
              *windows-arm64*setup*) echo "| Windows | ARM64 (Installer) | [$fname]($fname) ($size) |" >> release-notes.md ;;
              *windows-arm64*.zip) echo "| Windows | ARM64 (Portable) | [$fname]($fname) ($size) |" >> release-notes.md ;;
              *macos-arm64*) echo "| macOS | Apple Silicon | [$fname]($fname) ($size) |" >> release-notes.md ;;
              *macos-amd64*) echo "| macOS | Intel | [$fname]($fname) ($size) |" >> release-notes.md ;;
            esac
          done

          cat >> release-notes.md << 'NOTES'

          ### System Requirements
          - Windows 10+ / macOS 12+ / Linux (glibc 2.31+)
          - WebView2 runtime (Windows, auto-installed)
          - 4GB RAM minimum

          ### Configuration
          All settings are configurable via `config.yaml` or the in-app Settings panel.

          ---
          *Built with [Wails v2](https://wails.io) + Go + React + TypeScript*
          NOTES

          sed -i "s/\$VERSION/$VERSION/g" release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: release-files/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
