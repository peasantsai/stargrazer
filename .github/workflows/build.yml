name: Build Platform

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      goos:
        required: true
        type: string
      goarch:
        required: true
        type: string
      platform:
        required: true
        type: string
      artifact_name:
        required: true
        type: string
      chromium_url:
        required: true
        type: string
      chromium_cache_key:
        required: true
        type: string
      version:
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ${{ inputs.os }}
    env:
      BUILD_GOOS: ${{ inputs.goos }}
      BUILD_PLATFORM: ${{ inputs.platform }}
      BUILD_VERSION: ${{ inputs.version }}
      BUILD_ARTIFACT: ${{ inputs.artifact_name }}
      CHROMIUM_URL: ${{ inputs.chromium_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        shell: bash
        run: bash scripts/ci/install-deps.sh "$BUILD_GOOS"

      - name: Cache Chromium
        id: chromium-cache
        uses: actions/cache@v5
        with:
          path: assets/chromium-bundle
          key: ${{ inputs.chromium_cache_key }}-v3

      - name: Download Chromium
        if: steps.chromium-cache.outputs.cache-hit != 'true'
        shell: bash
        run: bash scripts/ci/download-chromium.sh "$BUILD_GOOS" "$CHROMIUM_URL" "assets/chromium-bundle"

      - name: Clean Chromium bundle
        if: steps.chromium-cache.outputs.cache-hit != 'true'
        shell: bash
        run: bash scripts/ci/clean-chromium.sh "assets/chromium-bundle"

      - name: Install Wails
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install garble
        shell: bash
        run: go install mvdan.cc/garble@latest

      - name: Install UPX (Linux)
        if: inputs.goos == 'linux'
        run: sudo apt-get install -y upx-ucl

      - name: Build
        shell: bash
        env:
          CGO_ENABLED: 1
        run: bash scripts/ci/build.sh "$BUILD_GOOS" "$BUILD_PLATFORM" "$BUILD_VERSION"

      - name: Compress with UPX
        if: inputs.goos == 'linux'
        run: upx --best build/bin/stargrazer || true

      - name: Bundle assets
        shell: bash
        run: bash scripts/ci/bundle-assets.sh "build/bin"

      - name: Package
        shell: bash
        run: bash scripts/ci/package.sh "$BUILD_GOOS" "$BUILD_ARTIFACT" "$BUILD_VERSION"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: dist/
          retention-days: 7
