name: Build Platform

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      goos:
        required: true
        type: string
      goarch:
        required: true
        type: string
      platform:
        required: true
        type: string
      artifact_name:
        required: true
        type: string
      chromium_url:
        required: true
        type: string
      chromium_cache_key:
        required: true
        type: string
      version:
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Linux dependencies
      - name: Install Linux dependencies
        if: inputs.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      # Cache Chromium
      - name: Cache Chromium
        id: chromium-cache
        uses: actions/cache@v5
        with:
          path: assets/chromium-bundle
          key: ${{ inputs.chromium_cache_key }}-v2

      # Download + extract Chromium
      - name: Download Chromium
        if: steps.chromium-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p assets/chromium-bundle
          FILENAME="/tmp/chromium-download"
          curl -L -o "$FILENAME" "${{ inputs.chromium_url }}"

          if [[ "${{ inputs.goos }}" == "linux" ]]; then
            mkdir -p /tmp/chromium-extract
            tar xf "$FILENAME" -C /tmp/chromium-extract 2>/dev/null || tar xJf "$FILENAME" -C /tmp/chromium-extract 2>/dev/null
            CHROME_DIR=$(find /tmp/chromium-extract -name "chrome" -type f -exec dirname {} \; | head -1)
            if [ -n "$CHROME_DIR" ]; then
              cp -R "$CHROME_DIR"/* assets/chromium-bundle/
            else
              cp -R /tmp/chromium-extract/*/* assets/chromium-bundle/ 2>/dev/null || cp -R /tmp/chromium-extract/* assets/chromium-bundle/
            fi

          elif [[ "${{ inputs.goos }}" == "darwin" ]]; then
            hdiutil attach "$FILENAME" -mountpoint /tmp/chromium-dmg -nobrowse
            cp -R /tmp/chromium-dmg/Chromium.app assets/chromium-bundle/
            hdiutil detach /tmp/chromium-dmg

          elif [[ "${{ inputs.goos }}" == "windows" ]]; then
            # Windows Chromium comes as .exe installer — extract with 7z
            7z x "$FILENAME" -o"/tmp/chromium-extract" -y || true
            # The installer extracts to Chrome-bin/ inside a chrome/ folder
            CHROME_BIN=$(find /tmp/chromium-extract -type d -name "Chrome-bin" | head -1)
            if [ -n "$CHROME_BIN" ]; then
              cp -R "$CHROME_BIN"/* assets/chromium-bundle/
            else
              # Fallback: copy everything
              cp -R /tmp/chromium-extract/* assets/chromium-bundle/ 2>/dev/null || true
            fi
          fi

      # Clean bundle
      - name: Clean Chromium bundle
        if: steps.chromium-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          cd assets/chromium-bundle
          rm -rf swiftshader VisualElements default_apps MEIPreload Dictionaries
          rm -rf "First Run" IwaKeyDistribution
          rm -f chrome_200_percent.pak notification_helper* elevation_service* chrome_proxy*
          rm -f chrome_pwa_launcher* chrome_wer* elevated_tracing_service*
          rm -f *.debug *.pdb
          if [ -d locales ]; then
            find locales -type f ! -name 'en-US.pak' -delete 2>/dev/null || true
          fi
          echo "=== Chromium bundle contents ==="
          ls -la
          echo "=== Size ==="
          du -sh .

      # Install Wails
      - name: Install Wails
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # Install platform tools
      - name: Install UPX (Linux)
        if: inputs.goos == 'linux'
        run: sudo apt-get install -y upx-ucl

      - name: Install NSIS (Windows)
        if: inputs.goos == 'windows'
        shell: bash
        run: choco install nsis -y

      # Build
      - name: Build
        shell: bash
        env:
          CGO_ENABLED: 1
        run: |
          VERSION="${{ inputs.version }}"
          TAGS=""
          LDFLAGS=""

          if [[ "${{ inputs.goos }}" == "linux" ]]; then
            TAGS="-tags webkit2_41"
          fi

          if [ -n "$VERSION" ]; then
            LDFLAGS="-ldflags \"-X main.version=$VERSION\""
          fi

          if [[ "${{ inputs.goos }}" == "windows" ]]; then
            wails build -platform ${{ inputs.platform }} -nsis -o stargrazer.exe $TAGS
          else
            wails build -platform ${{ inputs.platform }} -o stargrazer $TAGS
          fi

      # Compress (Linux only)
      - name: Compress with UPX
        if: inputs.goos == 'linux'
        run: upx --best build/bin/stargrazer || true

      # Bundle Chromium + extension into output
      - name: Bundle assets
        shell: bash
        run: |
          mkdir -p build/bin/assets/chromium-bundle
          cp -R assets/chromium-bundle/* build/bin/assets/chromium-bundle/ 2>/dev/null || true
          cp -R assets/cookies-extension build/bin/assets/cookies-extension 2>/dev/null || true

      # Package
      - name: Package
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [ -n "$VERSION" ]; then
            ARTIFACT="${{ inputs.artifact_name }}-${VERSION}"
          else
            ARTIFACT="${{ inputs.artifact_name }}"
          fi
          mkdir -p dist

          if [[ "${{ inputs.goos }}" == "windows" ]]; then
            cp build/bin/*installer* "dist/${ARTIFACT}-setup.exe" 2>/dev/null || true
            cd build/bin && 7z a "$GITHUB_WORKSPACE/dist/${ARTIFACT}.zip" . -r
          elif [[ "${{ inputs.goos }}" == "darwin" ]]; then
            cd build/bin && zip -r "$GITHUB_WORKSPACE/dist/${ARTIFACT}.zip" .
          else
            cd build/bin && tar czf "$GITHUB_WORKSPACE/dist/${ARTIFACT}.tar.gz" .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: dist/
          retention-days: 7
