name: Build Platform

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      goos:
        required: true
        type: string
      goarch:
        required: true
        type: string
      platform:
        required: true
        type: string
      artifact_name:
        required: true
        type: string
      chromium_url:
        required: true
        type: string
      chromium_cache_key:
        required: true
        type: string
      version:
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Linux dependencies
        if: inputs.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Cache Chromium
        id: chromium-cache
        uses: actions/cache@v5
        with:
          path: assets/chromium-bundle
          key: ${{ inputs.chromium_cache_key }}-v2

      - name: Download Chromium
        if: steps.chromium-cache.outputs.cache-hit != 'true'
        shell: bash
        run: bash scripts/ci/download-chromium.sh "${{ inputs.goos }}" "${{ inputs.chromium_url }}" "assets/chromium-bundle"

      - name: Clean Chromium bundle
        if: steps.chromium-cache.outputs.cache-hit != 'true'
        shell: bash
        run: bash scripts/ci/clean-chromium.sh "assets/chromium-bundle"

      - name: Install Wails
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install UPX (Linux)
        if: inputs.goos == 'linux'
        run: sudo apt-get install -y upx-ucl

      - name: Install NSIS (Windows)
        if: inputs.goos == 'windows'
        shell: bash
        run: choco install nsis -y

      - name: Build
        shell: bash
        env:
          CGO_ENABLED: 1
        run: bash scripts/ci/build.sh "${{ inputs.goos }}" "${{ inputs.platform }}" "${{ inputs.version }}"

      - name: Compress with UPX
        if: inputs.goos == 'linux'
        run: upx --best build/bin/stargrazer || true

      - name: Bundle assets
        shell: bash
        run: bash scripts/ci/bundle-assets.sh "build/bin"

      - name: Package
        shell: bash
        run: bash scripts/ci/package.sh "${{ inputs.goos }}" "${{ inputs.artifact_name }}" "${{ inputs.version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: dist/
          retention-days: 7
