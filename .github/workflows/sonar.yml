name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Frontend install and build
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Go test with coverage
        run: |
          go test -tags webkit2_41 -coverprofile=coverage.out -covermode=atomic ./... || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=peasantsai_stargrazer
            -Dsonar.organization=peasantsai
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/assets/uc-*/**,**/wailsjs/**
            -Dsonar.go.coverage.reportPaths=coverage.out
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
            -Dsonar.qualitygate.wait=true
