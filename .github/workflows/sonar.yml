name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Frontend install
        working-directory: ./frontend
        run: npm ci --ignore-scripts

      - name: Frontend test with coverage
        working-directory: ./frontend
        # Generate lcov.info at frontend/coverage/lcov.info for SonarCloud
        run: npm test -- --coverage || true

      - name: Frontend build
        working-directory: ./frontend
        run: npm run build

      - name: Go test with coverage
        run: go test -tags webkit2_41 -coverprofile=coverage.out -covermode=atomic ./... || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # --- Write SonarCloud quality gate + metrics table to workflow run page ---

      - name: Write SonarCloud summary
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error

          token = os.environ.get("SONAR_TOKEN", "")
          project_key = "peasantsai_stargrazer"
          org = "peasantsai"
          base = "https://sonarcloud.io/api"
          headers = {"Authorization": f"Bearer {token}"}

          def api_get(url):
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      return json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  print(f"HTTP {e.code} for {url}")
                  return None
              except Exception as e:
                  print(f"Error fetching {url}: {e}")
                  return None

          qg_data = api_get(f"{base}/qualitygates/project_status?projectKey={project_key}&organization={org}")

          metric_keys = "bugs,vulnerabilities,code_smells,coverage,duplicated_lines_density,ncloc,reliability_rating,security_rating,sqale_rating"
          measures_data = api_get(f"{base}/measures/component?component={project_key}&organization={org}&metricKeys={metric_keys}")

          RATING_MAP = {"1.0": "A", "2.0": "B", "3.0": "C", "4.0": "D", "5.0": "E"}
          METRIC_LABELS = {
              "ncloc": "Lines of Code",
              "bugs": "Bugs",
              "vulnerabilities": "Vulnerabilities",
              "code_smells": "Code Smells",
              "coverage": "Coverage",
              "duplicated_lines_density": "Duplication",
              "reliability_rating": "Reliability",
              "security_rating": "Security",
              "sqale_rating": "Maintainability",
          }

          summary_file = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(summary_file, "a") as f:
              f.write("## SonarCloud Analysis Results\n\n")

              if qg_data:
                  status = qg_data.get("projectStatus", {}).get("status", "UNKNOWN")
                  icon = "✅" if status == "OK" else "❌"
                  f.write(f"### Quality Gate: {icon} {status}\n\n")
                  conditions = qg_data.get("projectStatus", {}).get("conditions", [])
                  if conditions:
                      f.write("| Metric | Status | Actual | Threshold |\n")
                      f.write("|---|---|---|---|\n")
                      for c in conditions:
                          c_status = c.get("status", "")
                          c_icon = "✅" if c_status == "OK" else "❌"
                          metric = c.get("metricKey", "").replace("_", " ").title()
                          actual = c.get("actualValue", "—")
                          threshold = c.get("errorThreshold", "—")
                          f.write(f"| {metric} | {c_icon} {c_status} | {actual} | {threshold} |\n")
                      f.write("\n")
              else:
                  f.write("### Quality Gate: ⚠️ Could not fetch status\n\n")

              if measures_data:
                  f.write("### Metrics\n\n")
                  f.write("| Metric | Value |\n")
                  f.write("|---|---|\n")
                  measures = {m["metric"]: m.get("value", "—") for m in measures_data.get("component", {}).get("measures", [])}
                  for key, label in METRIC_LABELS.items():
                      val = measures.get(key, "—")
                      if key in ("reliability_rating", "security_rating", "sqale_rating"):
                          val = RATING_MAP.get(val, val)
                      elif key in ("coverage", "duplicated_lines_density") and val != "—":
                          val = f"{float(val):.1f}%"
                      f.write(f"| {label} | {val} |\n")
                  f.write("\n")

              f.write(f"🔗 [View full report](https://sonarcloud.io/project/overview?id={project_key})\n")
          PYEOF
