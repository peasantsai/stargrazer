name: SBOM & Vulnerability Scan

on:
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  security-events: write

jobs:
  sbom-and-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci --ignore-scripts

      - name: npm audit (frontend CVE check)
        working-directory: ./frontend
        run: npm audit --json > ../npm-audit.json 2>&1 || true
        id: npm_audit

      # --- Syft: generate SBOMs ---

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate Go SBOM (CycloneDX)
        # Use default catalogers — .grype.yaml suppresses stdlib@go1.19.3 false positives
        # that the go-module-binary cataloger can detect from pre-compiled runner binaries.
        run: syft scan dir:. -o cyclonedx-json=sbom-go.cdx.json

      - name: Generate Frontend SBOM (CycloneDX)
        run: syft scan dir:frontend -o cyclonedx-json=sbom-frontend.cdx.json

      - name: Generate combined SBOM (SPDX)
        run: syft scan dir:. -o spdx-json=sbom-combined.spdx.json

      # --- Grype: vulnerability scan ---

      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan Go SBOM for vulnerabilities
        run: |
          grype sbom:sbom-go.cdx.json \
            --config .grype.yaml \
            --output json=grype-go.json \
            --output sarif=grype-go.sarif \
            --fail-on critical
        continue-on-error: true
        id: grype_go

      - name: Scan Frontend SBOM for vulnerabilities
        run: |
          grype sbom:sbom-frontend.cdx.json \
            --config .grype.yaml \
            --output json=grype-frontend.json \
            --output sarif=grype-frontend.sarif \
            --fail-on critical
        continue-on-error: true
        id: grype_frontend

      # --- Write vulnerability summary table to workflow run page ---

      - name: Write vulnerability summary
        if: always()
        run: |
          python3 << 'PYEOF'
          import json, os, sys

          SEVERITY_ORDER = {"Critical": 0, "High": 1, "Medium": 2, "Low": 3, "Negligible": 4, "Unknown": 5}
          SEVERITY_EMOJI = {"Critical": "🔴", "High": "🟠", "Medium": "🟡", "Low": "🔵", "Negligible": "⚪", "Unknown": "❓"}

          def load_matches(path, source_label):
              try:
                  with open(path) as f:
                      data = json.load(f)
                  results = []
                  for m in data.get("matches", []):
                      vuln = m.get("vulnerability", {})
                      artifact = m.get("artifact", {})
                      fix_versions = vuln.get("fix", {}).get("versions", [])
                      results.append({
                          "source": source_label,
                          "package": artifact.get("name", ""),
                          "version": artifact.get("version", ""),
                          "id": vuln.get("id", ""),
                          "severity": vuln.get("severity", "Unknown"),
                          "fixed_in": ", ".join(fix_versions) if fix_versions else "—",
                      })
                  return results
              except FileNotFoundError:
                  return []

          def load_npm_audit(path):
              try:
                  with open(path) as f:
                      data = json.load(f)
                  results = []
                  SEV_MAP = {"critical": "Critical", "high": "High", "moderate": "Medium", "low": "Low", "info": "Low"}
                  for name, vuln in data.get("vulnerabilities", {}).items():
                      sev = SEV_MAP.get(vuln.get("severity", ""), "Unknown")
                      fix_available = vuln.get("fixAvailable", False)
                      fixed_in = "available" if fix_available is True else ("—" if fix_available is False else str(fix_available))
                      via = vuln.get("via", [])
                      advisory_ids = [v.get("url", "").split("/")[-1] for v in via if isinstance(v, dict) and v.get("url")]
                      advisory = ", ".join(filter(None, advisory_ids)) or "—"
                      results.append({
                          "source": "npm audit",
                          "package": name,
                          "version": vuln.get("range", ""),
                          "id": advisory,
                          "severity": sev,
                          "fixed_in": fixed_in,
                      })
                  return results
              except (FileNotFoundError, json.JSONDecodeError):
                  return []

          all_matches = load_matches("grype-go.json", "Go") + load_matches("grype-frontend.json", "Frontend") + load_npm_audit("npm-audit.json")
          all_matches.sort(key=lambda m: (SEVERITY_ORDER.get(m["severity"], 99), m["package"]))

          counts = {}
          for m in all_matches:
              counts[m["severity"]] = counts.get(m["severity"], 0) + 1
          critical_count = counts.get("Critical", 0)

          summary_file = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(summary_file, "a") as f:
              f.write("## Vulnerability Scan Results\n\n")

              f.write("### Summary\n\n")
              if not all_matches:
                  f.write("✅ No vulnerabilities found.\n\n")
              else:
                  f.write("| Severity | Count |\n")
                  f.write("|---|---|\n")
                  for sev in ["Critical", "High", "Medium", "Low", "Negligible", "Unknown"]:
                      if sev in counts:
                          f.write(f"| {SEVERITY_EMOJI.get(sev, '')} {sev} | {counts[sev]} |\n")
                  f.write("\n")

              if all_matches:
                  f.write("### Details\n\n")
                  f.write("| Source | Package | Version | Vulnerability | Severity | Fixed In |\n")
                  f.write("|---|---|---|---|---|---|\n")
                  for m in all_matches:
                      emoji = SEVERITY_EMOJI.get(m["severity"], "")
                      f.write(f"| {m['source']} | `{m['package']}` | `{m['version']}` | {m['id']} | {emoji} {m['severity']} | {m['fixed_in']} |\n")
                  f.write("\n")

              if critical_count > 0:
                  f.write(f"❌ **{critical_count} critical vulnerability(ies) found — build failed.**\n")
              else:
                  f.write("✅ No critical vulnerabilities.\n")

          if critical_count > 0:
              sys.exit(1)
          PYEOF

      # --- Upload results ---

      - name: Upload Go SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: grype-go.sarif
          category: grype-go
        continue-on-error: true

      - name: Upload Frontend SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: grype-frontend.sarif
          category: grype-frontend
        continue-on-error: true

      - name: Upload SBOMs as artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sbom-reports
          path: |
            sbom-go.cdx.json
            sbom-frontend.cdx.json
            sbom-combined.spdx.json
          retention-days: 90

      - name: Upload Grype reports as artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: grype-reports
          path: |
            grype-go.json
            grype-go.sarif
            grype-frontend.json
            grype-frontend.sarif
            npm-audit.json
          retention-days: 90

