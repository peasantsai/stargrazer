sonar.projectKey=peasantsai_stargrazer
sonar.organization=peasantsai
sonar.projectName=Stargrazer
sonar.host.url=https://sonarcloud.io

sonar.sources=.
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/bin/**,\
  **/assets/uc-*/**,\
  **/assets/cookies-extension/**,\
  **/wailsjs/**,\
  **/vendor/**,\
  **/*.test.go,\
  **/scripts/**,\
  frontend/coverage/**,\
  frontend/src/test/**

# Test file locations
sonar.test.inclusions=\
  frontend/src/**/*.test.ts,\
  frontend/src/**/*.test.tsx,\
  frontend/src/test/**,\
  **/*_test.go

# Coverage reports
sonar.go.coverage.reportPaths=coverage.out
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Exclude generated / test files from coverage enforcement
sonar.coverage.exclusions=\
  **/wailsjs/**,\
  frontend/src/test/**,\
  frontend/src/**/*.test.ts,\
  frontend/src/**/*.test.tsx,\
  frontend/src/main.tsx,\
  frontend/src/vite-env.d.ts

sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=true
