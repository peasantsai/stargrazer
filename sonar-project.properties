sonar.projectKey=peasantsai_stargrazer
sonar.organization=peasantsai
sonar.projectName=Stargrazer
sonar.host.url=https://sonarcloud.io

sonar.sources=.
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/bin/**,**/assets/uc-*/**,**/assets/cookies-extension/**,**/wailsjs/**,**/vendor/**,**/*.test.go,**/scripts/**

# Go
sonar.go.coverage.reportPaths=coverage.out
sonar.sourceEncoding=UTF-8

# TypeScript/JavaScript
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info

# Quality gate — disabled until test coverage is established
# Re-enable with: sonar.qualitygate.wait=true
sonar.qualitygate.wait=false
